name: Build portable

# Собирает портативные бинарники GigaAM Transcriber для трёх платформ.
# Во всех случаях используется ОДИН подход (как на Windows): PyTorch НЕ вшивается
# в бинарник, а скачивается при первом запуске в общий кэш с выбором устройства.
# torch в окружении сборки нужен только чтобы PyInstaller смог проанализировать
# gigaam/pyannote — в итоговый файл он не попадает (см. packaging/gigaam_app_portable.spec).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: test-tui

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            asset: GigaAMTranscriber-windows-x64.exe
            offline_asset: GigaAMTranscriber-windows-x64-offline.zip
            built: dist/GigaAMTranscriber_portable.exe
            torch_index: "--index-url https://download.pytorch.org/whl/cpu"

          - os: macos-14
            label: macOS arm64
            asset: GigaAMTranscriber-macos-arm64
            offline_asset: GigaAMTranscriber-macos-arm64-offline.zip
            built: dist/GigaAMTranscriber_portable
            torch_index: ""

          - os: ubuntu-latest
            label: Linux x64
            asset: GigaAMTranscriber-linux-x64
            offline_asset: GigaAMTranscriber-linux-x64-offline.zip
            built: dist/GigaAMTranscriber_portable
            torch_index: "--index-url https://download.pytorch.org/whl/cpu"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      # ffmpeg нужен приложению в рантайме; EGL/GL — для offscreen PyQt GUI-тестов.
      - name: Install ffmpeg and Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libegl1 libgl1

      # --- Вкладываем ПРАВИЛЬНЫЙ по ОС/арх. ffmpeg в bin/, чтобы он вшился в
      # портативный бинарник (спек забирает bin/ffmpeg.exe на Windows и
      # bin/ffmpeg на других ОС). Так у пользователя всё работает без ручной
      # установки ffmpeg. macOS использует уже закоммиченный arm64-бинарь bin/ffmpeg.
      - name: Provision bundled ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item (Get-ChildItem -Recurse ffmpeg_extract -Filter ffmpeg.exe  | Select-Object -First 1).FullName bin/ffmpeg.exe  -Force
          Copy-Item (Get-ChildItem -Recurse ffmpeg_extract -Filter ffprobe.exe | Select-Object -First 1).FullName bin/ffprobe.exe -Force
          ./bin/ffmpeg.exe -version

      - name: Provision bundled ffmpeg (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          url="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          curl -fL "$url" -o ffmpeg.tar.xz
          mkdir -p ffmpeg_extract bin
          tar -xf ffmpeg.tar.xz -C ffmpeg_extract --strip-components=1
          cp ffmpeg_extract/bin/ffmpeg  bin/ffmpeg
          cp ffmpeg_extract/bin/ffprobe bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe
          ./bin/ffmpeg -version

      - name: Verify bundled ffmpeg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # macOS использует закоммиченный arm64 bin/ffmpeg — убеждаемся, что он на месте и запускается.
          test -f bin/ffmpeg || { echo "bin/ffmpeg отсутствует в репозитории"; exit 1; }
          chmod +x bin/ffmpeg
          ./bin/ffmpeg -version

      # GigaAM на указанном коммите использует pkg_resources в setup.py.
      # pkg_resources удалён из новых setuptools, поэтому фиксируем последнюю безопасную ветку.
      - name: Upgrade pip toolchain
        run: |
          python -m pip install --upgrade pip wheel "setuptools==81.0.0"
          python -c "import setuptools, pkg_resources; print('setuptools:', setuptools.__version__); print('pkg_resources: OK')"

      # torch в окружении сборки — только для анализа PyInstaller (в бинарник не попадёт).
      - name: Install build-time torch
        run: python -m pip install "torch==2.8.0" "torchaudio==2.8.0" "torchvision==0.23.0" ${{ matrix.torch_index }}

      # Ставим зависимости БЕЗ torchcodec (хрупкая линковка с ffmpeg; приложение
      # использует soundfile) и БЕЗ editable-строки gigaam (её ставим отдельно).
      - name: Install project requirements
        shell: bash
        run: |
          grep -viE '^\s*(-e\s+)?git\+.*gigaam|^\s*torchcodec' requirements.txt > requirements.ci.txt
          python -m pip install -r requirements.ci.txt

      # gigaam собирается из git и требует уже установленный torch → --no-build-isolation.
      # Перед установкой повторно фиксируем setuptools, чтобы предыдущие pip-операции
      # не могли утащить окружение на setuptools без pkg_resources.
      - name: Install gigaam
        run: |
          python -m pip install --upgrade "setuptools==81.0.0" wheel
          python -c "import pkg_resources; print('pkg_resources: OK before GigaAM install')"
          python -m pip install "git+https://github.com/salute-developers/GigaAM.git@559d88d6b72541412743929f633a6ae7c9950b85#egg=gigaam" --no-build-isolation

      # GPU-wheel содержит также CPUExecutionProvider. Оставляем ровно один
      # дистрибутив: установка GigaAM выше возвращает CPU-wheel своей жёсткой
      # зависимостью, поэтому замену выполняем последней.
      - name: Install GPU ONNX Runtime (Windows/Linux)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          python -m pip uninstall -y onnxruntime onnxruntime-gpu
          python -m pip install --no-cache-dir -r requirements-onnx-gpu.txt
          python - <<'PY'
          import importlib.metadata
          import onnxruntime

          assert importlib.metadata.version("onnxruntime-gpu") == "1.23.2"
          assert callable(onnxruntime.preload_dlls)
          providers = onnxruntime.get_available_providers()
          assert "CUDAExecutionProvider" in providers, providers
          assert "CPUExecutionProvider" in providers, providers
          print("ONNX Runtime GPU providers:", providers)
          PY

      - name: Verify macOS CoreML ONNX Runtime
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python - <<'PY'
          import importlib.metadata
          import onnxruntime

          assert importlib.metadata.version("onnxruntime") == "1.23.2"
          providers = onnxruntime.get_available_providers()
          assert "CoreMLExecutionProvider" in providers, providers
          assert "CPUExecutionProvider" in providers, providers
          print("ONNX Runtime macOS providers:", providers)
          PY

      - name: Install PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Test runtime and processor compatibility layer
        run: >-
          python -m pytest
          tests/test_runtime_patches.py
          tests/test_torch_downloader.py
          tests/test_runtime_manager.py
          tests/test_selfcheck.py
          tests/test_packaging_runtime_deps.py
          tests/test_sortformer_onnx.py
          tests/test_app_sortformer_smoke.py
          tests/test_processor_progress.py
          tests/test_subtitles.py
          tests/test_formatters.py
          tests/test_diarization_mapping.py
          tests/test_cli_backend.py
          tests/test_tui_worker.py
          tests/test_web_app_persistence.py
          tests/test_data_paths.py
          tests/test_portable_data_interfaces.py
          tests/test_gui_data_directory.py
          tests/test_app_boot.py
          tests/test_download_models.py
          -q

      - name: Build (PyInstaller, portable spec)
        run: python -m PyInstaller packaging/gigaam_app_portable.spec --noconfirm

      # Гейт: гоняем СОБРАННЫЙ бинарь с --selfcheck. Он скачивает torch под ОС и
      # импортирует всю цепочку (torchvision→PIL, pyannote→sincnet→asteroid, docx).
      # Любая недостающая зависимость сборки → job падает, релиз не публикуется (issue #19).
      - name: Smoke-test built binary (import self-check)
        shell: bash
        timeout-minutes: 20
        env:
          GIGAAM_RUNTIME_DIR: ${{ runner.temp }}/gigaam_selfcheck
        run: |
          BIN="${{ matrix.built }}"
          chmod +x "$BIN" || true
          if ! "$BIN" --selfcheck; then
            echo "=== selfcheck.log ==="
            cat "$GIGAAM_RUNTIME_DIR/selfcheck.log" 2>/dev/null || echo "(no selfcheck.log written)"
            exit 1
          fi

      - name: Smoke-test Windows Sortformer ONNX and Linux CPU fallback
        if: runner.os != 'macOS'
        shell: bash
        timeout-minutes: 20
        env:
          GIGAAM_RUNTIME_DIR: ${{ runner.temp }}/gigaam_sortformer_onnx
        run: |
          BIN="${{ matrix.built }}"
          "$BIN" --sortformer-onnx-smoke

      - name: Smoke-test macOS Sortformer ONNX CoreML
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 20
        env:
          GIGAAM_RUNTIME_DIR: ${{ runner.temp }}/gigaam_sortformer_coreml
          GIGAAM_SMOKE_ONNX_PROVIDER: coreml
        run: |
          BIN="${{ matrix.built }}"
          chmod +x "$BIN"
          "$BIN" --sortformer-onnx-smoke

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.built }}" "out/${{ matrix.asset }}"

      - name: Make executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x "out/${{ matrix.asset }}"

      # Офлайн-вариант: тот же бинарник плюс папка models рядом с ним. Внутрь
      # onefile модели не вшиваем — иначе 884 МБ распаковывались бы во временный
      # каталог при каждом запуске.
      - name: Assemble offline bundle
        shell: bash
        run: |
          python scripts/build_offline_models.py --output offline/models/hf
          cp "out/${{ matrix.asset }}" "offline/${{ matrix.asset }}"

      # Гейт офлайн-артефакта: гоняем СОБРАННЫЙ бинарь с пустым кэшем и
      # HF_HUB_OFFLINE=1. Если хоть одна модель не нашлась рядом, job падает —
      # иначе «офлайн»-сборка молча ушла бы в релиз, продолжая ходить в сеть.
      - name: Smoke-test offline bundle (no network for models)
        shell: bash
        timeout-minutes: 20
        env:
          GIGAAM_RUNTIME_DIR: ${{ runner.temp }}/gigaam_offline
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          BIN="offline/${{ matrix.asset }}"
          chmod +x "$BIN" || true
          "$BIN" --offline-models-smoke

      - name: Archive offline bundle (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p out
          chmod +x "offline/${{ matrix.asset }}"
          (cd offline && zip -qr "../out/${{ matrix.offline_asset }}" .)

      - name: Archive offline bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path offline/* -DestinationPath "out/${{ matrix.offline_asset }}" -Force

      - name: Check offline bundle size
        shell: bash
        run: |
          ARCHIVE="out/${{ matrix.offline_asset }}"
          ARCHIVE_BYTES=$(python -c "import os,sys; print(os.path.getsize(sys.argv[1]))" "$ARCHIVE")
          MAX_RELEASE_ASSET_BYTES=$((2 * 1024 * 1024 * 1024))
          echo "офлайн-архив: $((ARCHIVE_BYTES / 1024 / 1024)) МБ"
          test "$ARCHIVE_BYTES" -lt "$MAX_RELEASE_ASSET_BYTES" || {
            echo "Офлайн-архив слишком велик для GitHub Release: $ARCHIVE_BYTES байт"
            exit 1
          }

      - name: Upload offline artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.offline_asset }}
          path: out/${{ matrix.offline_asset }}
          if-no-files-found: error
          compression-level: 0

      - name: Attach offline bundle to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.offline_asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
          if-no-files-found: error

      # По тегу vX.Y.Z — прикрепляем бинарники к GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}

  build-macos-full:
    name: macOS arm64 full app bundle
    runs-on: macos-14
    needs: test-tui
    timeout-minutes: 60
    env:
      GIGAAM_BUNDLE_SORTFORMER: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify bundled ffmpeg
        shell: bash
        run: |
          test -f bin/ffmpeg || { echo "bin/ffmpeg отсутствует в репозитории"; exit 1; }
          chmod +x bin/ffmpeg
          ./bin/ffmpeg -version

      - name: Upgrade pip toolchain
        run: python -m pip install --upgrade pip wheel "setuptools==81.0.0"

      - name: Install bundled runtime dependencies
        shell: bash
        run: |
          python -m pip install "torch==2.8.0" "torchaudio==2.8.0" "torchvision==0.23.0"
          grep -viE '^\s*(-e\s+)?git\+.*gigaam|^\s*torchcodec' requirements.txt > requirements.ci.txt
          python -m pip install -r requirements.ci.txt
          python -m pip install --upgrade "setuptools==81.0.0" wheel
          python -m pip install "git+https://github.com/salute-developers/GigaAM.git@559d88d6b72541412743929f633a6ae7c9950b85#egg=gigaam" --no-build-isolation
          python -m pip install -r requirements-macos-mlx.txt
          python -m pip install -r requirements-sortformer.txt
          python -m pip install --upgrade pyinstaller

      - name: Test macOS packaging configuration
        run: python -m pytest tests/test_macos_packaging_config.py tests/test_packaging_runtime_deps.py -q

      - name: Build and verify full app bundle
        run: bash packaging/build_exe_mac.sh

      - name: Verify release version and archive full app
        id: archive
        shell: bash
        run: |
          BUNDLE="dist/GigaAMTranscriber.app"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
            ACTUAL_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$BUNDLE/Contents/Info.plist")
            test "$ACTUAL_VERSION" = "$EXPECTED_VERSION" || {
              echo "Версия .app ($ACTUAL_VERSION) не совпадает с тегом ($EXPECTED_VERSION)"
              exit 1
            }
          fi

          SAFE_REF_NAME="${GITHUB_REF_NAME//\//-}"
          ARCHIVE="out/GigaAMTranscriber-macos-app-${SAFE_REF_NAME}.zip"
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent "$BUNDLE" "$ARCHIVE"
          unzip -tq "$ARCHIVE"
          ARCHIVE_BYTES=$(stat -f%z "$ARCHIVE")
          MAX_RELEASE_ASSET_BYTES=$((2 * 1024 * 1024 * 1024))
          test "$ARCHIVE_BYTES" -lt "$MAX_RELEASE_ASSET_BYTES" || {
            echo "Архив слишком велик для GitHub Release: $ARCHIVE_BYTES байт"
            exit 1
          }
          echo "path=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ARCHIVE")" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$ARCHIVE_BYTES" >> "$GITHUB_OUTPUT"

      - name: Upload full app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          compression-level: 0

      - name: Attach full app to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive.outputs.path }}

      # Офлайн-вариант: тот же .app плюс папка models рядом с ним. Внутрь
      # бандла модели не кладём, чтобы не ломать подпись при докачке остальных.
      - name: Archive offline full app
        id: archive_offline
        shell: bash
        run: |
          python scripts/build_offline_models.py --output offline/models/hf
          ditto dist/GigaAMTranscriber.app offline/GigaAMTranscriber.app

          # Тот же гейт, что и для портативных сборок: модели обязаны найтись
          # рядом с .app, без обращения к сети.
          env GIGAAM_RUNTIME_DIR="${RUNNER_TEMP}/gigaam_offline" \
              HF_HUB_OFFLINE=1 TRANSFORMERS_OFFLINE=1 \
              offline/GigaAMTranscriber.app/Contents/MacOS/GigaAMTranscriber \
              --offline-models-smoke

          SAFE_REF_NAME="${GITHUB_REF_NAME//\//-}"
          ARCHIVE="out/GigaAMTranscriber-macos-app-offline-${SAFE_REF_NAME}.zip"
          mkdir -p out
          ditto -c -k --sequesterRsrc offline "$ARCHIVE"
          unzip -tq "$ARCHIVE"
          ARCHIVE_BYTES=$(stat -f%z "$ARCHIVE")
          MAX_RELEASE_ASSET_BYTES=$((2 * 1024 * 1024 * 1024))
          test "$ARCHIVE_BYTES" -lt "$MAX_RELEASE_ASSET_BYTES" || {
            echo "Офлайн-архив слишком велик для GitHub Release: $ARCHIVE_BYTES байт"
            exit 1
          }
          echo "path=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ARCHIVE")" >> "$GITHUB_OUTPUT"

      - name: Upload offline full app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.archive_offline.outputs.name }}
          path: ${{ steps.archive_offline.outputs.path }}
          if-no-files-found: error
          compression-level: 0

      - name: Attach offline full app to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive_offline.outputs.path }}

  test-tui:
    name: TUI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Test TUI
        working-directory: tui
        run: cargo test --locked

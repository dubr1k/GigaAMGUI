name: Build portable

# Собирает портативные бинарники GigaAM Transcriber для трёх платформ.
# Во всех случаях используется ОДИН подход (как на Windows): PyTorch НЕ вшивается
# в бинарник, а скачивается при первом запуске в общий кэш с выбором устройства.
# torch в окружении сборки нужен только чтобы PyInstaller смог проанализировать
# gigaam/pyannote — в итоговый файл он не попадает (см. packaging/gigaam_app_portable.spec).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            asset: GigaAMTranscriber-windows-x64.exe
            built: dist/GigaAMTranscriber_portable.exe
            torch_index: "--index-url https://download.pytorch.org/whl/cpu"

          - os: macos-14
            label: macOS arm64
            asset: GigaAMTranscriber-macos-arm64
            built: dist/GigaAMTranscriber_portable
            torch_index: ""

          - os: ubuntu-latest
            label: Linux x64
            asset: GigaAMTranscriber-linux-x64
            built: dist/GigaAMTranscriber_portable
            torch_index: "--index-url https://download.pytorch.org/whl/cpu"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      # ffmpeg нужен приложению в рантайме; в Linux ставим системный для сборки IO-зависимостей.
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # --- Вкладываем ПРАВИЛЬНЫЙ по ОС/арх. ffmpeg в bin/, чтобы он вшился в
      # портативный бинарник (спек забирает bin/ffmpeg.exe на Windows и
      # bin/ffmpeg на других ОС). Так у пользователя всё работает без ручной
      # установки ffmpeg. macOS использует уже закоммиченный arm64-бинарь bin/ffmpeg.
      - name: Provision bundled ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item (Get-ChildItem -Recurse ffmpeg_extract -Filter ffmpeg.exe  | Select-Object -First 1).FullName bin/ffmpeg.exe  -Force
          Copy-Item (Get-ChildItem -Recurse ffmpeg_extract -Filter ffprobe.exe | Select-Object -First 1).FullName bin/ffprobe.exe -Force
          ./bin/ffmpeg.exe -version

      - name: Provision bundled ffmpeg (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          url="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          curl -fL "$url" -o ffmpeg.tar.xz
          mkdir -p ffmpeg_extract bin
          tar -xf ffmpeg.tar.xz -C ffmpeg_extract --strip-components=1
          cp ffmpeg_extract/bin/ffmpeg  bin/ffmpeg
          cp ffmpeg_extract/bin/ffprobe bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe
          ./bin/ffmpeg -version

      - name: Verify bundled ffmpeg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # macOS использует закоммиченный arm64 bin/ffmpeg — убеждаемся, что он на месте и запускается.
          test -f bin/ffmpeg || { echo "bin/ffmpeg отсутствует в репозитории"; exit 1; }
          chmod +x bin/ffmpeg
          ./bin/ffmpeg -version

      # GigaAM на указанном коммите использует pkg_resources в setup.py.
      # pkg_resources удалён из новых setuptools, поэтому фиксируем последнюю безопасную ветку.
      - name: Upgrade pip toolchain
        run: |
          python -m pip install --upgrade pip wheel "setuptools==81.0.0"
          python -c "import setuptools, pkg_resources; print('setuptools:', setuptools.__version__); print('pkg_resources: OK')"

      # torch в окружении сборки — только для анализа PyInstaller (в бинарник не попадёт).
      - name: Install build-time torch
        run: python -m pip install "torch==2.8.0" "torchaudio==2.8.0" "torchvision==0.23.0" ${{ matrix.torch_index }}

      # Ставим зависимости БЕЗ torchcodec (хрупкая линковка с ffmpeg; приложение
      # использует soundfile) и БЕЗ editable-строки gigaam (её ставим отдельно).
      - name: Install project requirements
        shell: bash
        run: |
          grep -viE '^\s*(-e\s+)?git\+.*gigaam|^\s*torchcodec' requirements.txt > requirements.ci.txt
          python -m pip install -r requirements.ci.txt

      # gigaam собирается из git и требует уже установленный torch → --no-build-isolation.
      # Перед установкой повторно фиксируем setuptools, чтобы предыдущие pip-операции
      # не могли утащить окружение на setuptools без pkg_resources.
      - name: Install gigaam
        run: |
          python -m pip install --upgrade "setuptools==81.0.0" wheel
          python -c "import pkg_resources; print('pkg_resources: OK before GigaAM install')"
          python -m pip install "git+https://github.com/salute-developers/GigaAM.git@559d88d6b72541412743929f633a6ae7c9950b85#egg=gigaam" --no-build-isolation

      - name: Install PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Test runtime compatibility layer
        run: python -m pytest tests/test_runtime_patches.py tests/test_torch_downloader.py tests/test_runtime_manager.py tests/test_selfcheck.py tests/test_packaging_runtime_deps.py -q

      - name: Build (PyInstaller, portable spec)
        run: python -m PyInstaller packaging/gigaam_app_portable.spec --noconfirm

      # Гейт: гоняем СОБРАННЫЙ бинарь с --selfcheck. Он скачивает torch под ОС и
      # импортирует всю цепочку (torchvision→PIL, pyannote→sincnet→asteroid, docx).
      # Любая недостающая зависимость сборки → job падает, релиз не публикуется (issue #19).
      - name: Smoke-test built binary (import self-check)
        shell: bash
        timeout-minutes: 20
        env:
          GIGAAM_RUNTIME_DIR: ${{ runner.temp }}/gigaam_selfcheck
        run: |
          BIN="${{ matrix.built }}"
          chmod +x "$BIN" || true
          if ! "$BIN" --selfcheck; then
            echo "=== selfcheck.log ==="
            cat "$GIGAAM_RUNTIME_DIR/selfcheck.log" 2>/dev/null || echo "(no selfcheck.log written)"
            exit 1
          fi

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.built }}" "out/${{ matrix.asset }}"

      - name: Make executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x "out/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
          if-no-files-found: error

      # По тегу vX.Y.Z — прикрепляем бинарники к GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}

  build-macos-full:
    name: macOS arm64 full app bundle
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify bundled ffmpeg
        shell: bash
        run: |
          test -f bin/ffmpeg || { echo "bin/ffmpeg отсутствует в репозитории"; exit 1; }
          chmod +x bin/ffmpeg
          ./bin/ffmpeg -version

      - name: Upgrade pip toolchain
        run: python -m pip install --upgrade pip wheel "setuptools==81.0.0"

      - name: Install bundled runtime dependencies
        shell: bash
        run: |
          python -m pip install "torch==2.8.0" "torchaudio==2.8.0" "torchvision==0.23.0"
          grep -viE '^\s*(-e\s+)?git\+.*gigaam|^\s*torchcodec' requirements.txt > requirements.ci.txt
          python -m pip install -r requirements.ci.txt
          python -m pip install --upgrade "setuptools==81.0.0" wheel
          python -m pip install "git+https://github.com/salute-developers/GigaAM.git@559d88d6b72541412743929f633a6ae7c9950b85#egg=gigaam" --no-build-isolation
          python -m pip install -r requirements-macos-mlx.txt
          python -m pip install --upgrade pyinstaller

      - name: Test macOS packaging configuration
        run: python -m pytest tests/test_macos_packaging_config.py tests/test_packaging_runtime_deps.py -q

      - name: Build and verify full app bundle
        run: bash packaging/build_exe_mac.sh

      - name: Verify release version and archive full app
        id: archive
        shell: bash
        run: |
          BUNDLE="dist/GigaAMTranscriber.app"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
            ACTUAL_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$BUNDLE/Contents/Info.plist")
            test "$ACTUAL_VERSION" = "$EXPECTED_VERSION" || {
              echo "Версия .app ($ACTUAL_VERSION) не совпадает с тегом ($EXPECTED_VERSION)"
              exit 1
            }
          fi

          SAFE_REF_NAME="${GITHUB_REF_NAME//\//-}"
          ARCHIVE="out/GigaAMTranscriber-macos-app-${SAFE_REF_NAME}.zip"
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent "$BUNDLE" "$ARCHIVE"
          unzip -tq "$ARCHIVE"
          ARCHIVE_BYTES=$(stat -f%z "$ARCHIVE")
          MAX_RELEASE_ASSET_BYTES=$((2 * 1024 * 1024 * 1024))
          test "$ARCHIVE_BYTES" -lt "$MAX_RELEASE_ASSET_BYTES" || {
            echo "Архив слишком велик для GitHub Release: $ARCHIVE_BYTES байт"
            exit 1
          }
          echo "path=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ARCHIVE")" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$ARCHIVE_BYTES" >> "$GITHUB_OUTPUT"

      - name: Upload full app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          compression-level: 0

      - name: Attach full app to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive.outputs.path }}
